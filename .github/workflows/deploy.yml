name: CI/CD Deploy to EC2

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: production-deploy
  cancel-in-progress: true

env:
  NODE_VERSION: "20"
  REGISTRY: docker.io
  IMAGE_NAME: ${{ secrets.DOCKER_USERNAME }}/ecommerce-backend
  APP_PORT: 4953

jobs:
  test:
    name: Run Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm test

  build:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    outputs:
      image_ref: ${{ steps.image_ref.outputs.image_ref }}

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Compute image reference
        id: image_ref
        shell: bash
        run: |
          SHORT_SHA="${GITHUB_SHA::7}"
          IMAGE_REF="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:sha-${SHORT_SHA}"
          echo "image_ref=${IMAGE_REF}" >> "$GITHUB_OUTPUT"
          echo "Using image ref: ${IMAGE_REF}"

      - name: Build and push commit image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ steps.image_ref.outputs.image_ref }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache,mode=max

  deploy:
    name: Deploy to AWS EC2
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Deploy application on EC2
        uses: appleboy/ssh-action@v1.0.3
        env:
          APP_IMAGE: ${{ needs.build.outputs.image_ref || format('{0}/{1}:latest', env.REGISTRY, env.IMAGE_NAME) }}
          APP_PORT: ${{ env.APP_PORT }}
          DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
          DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
          MONGODB_URL: ${{ secrets.MONGODB_URL }}
          REDIS_URL: ${{ secrets.REDIS_URL }}
          MONGO_USER: ${{ secrets.MONGO_USER }}
          MONGO_PASSWORD: ${{ secrets.MONGO_PASSWORD }}
          ACCESS_TOKEN_SECRET: ${{ secrets.ACCESS_TOKEN_SECRET }}
          REFRESH_TOKEN_SECRET: ${{ secrets.REFRESH_TOKEN_SECRET }}
          EMAIL_USER: ${{ secrets.EMAIL_USER }}
          EMAIL_PASS: ${{ secrets.EMAIL_PASS }}
          GOOGLE_OAUTH_CLIENT_ID: ${{ secrets.GOOGLE_OAUTH_CLIENT_ID }}
          GOOGLE_OAUTH_CLIENT_SECRET: ${{ secrets.GOOGLE_OAUTH_CLIENT_SECRET }}
          GOOGLE_OAUTH_REDIRECT_URI: ${{ secrets.GOOGLE_OAUTH_REDIRECT_URI }}
          VNPAY_PAYMENT_URL: ${{ secrets.VNPAY_PAYMENT_URL }}
          VNPAY_TERMINAL_CODE: ${{ secrets.VNPAY_TERMINAL_CODE }}
          VNPAY_HASH_SECRET: ${{ secrets.VNPAY_HASH_SECRET }}
          VNPAY_RETURN_URL: ${{ secrets.VNPAY_RETURN_URL }}
          VNPAY_IPN_URL: ${{ secrets.VNPAY_IPN_URL }}
          GLOBAL_API_RATE_LIMIT_MAX_REQUESTS: ${{ secrets.GLOBAL_API_RATE_LIMIT_MAX_REQUESTS }}
          GLOBAL_API_RATE_LIMIT_WINDOW_SECONDS: ${{ secrets.GLOBAL_API_RATE_LIMIT_WINDOW_SECONDS }}
          LOGIN_FAIL_MAX_ATTEMPTS: ${{ secrets.LOGIN_FAIL_MAX_ATTEMPTS }}
          LOGIN_FAIL_WINDOW_SECONDS: ${{ secrets.LOGIN_FAIL_WINDOW_SECONDS }}
          LOGIN_FAIL_BLOCK_SECONDS: ${{ secrets.LOGIN_FAIL_BLOCK_SECONDS }}
          OTP_TTL_SECONDS: ${{ secrets.OTP_TTL_SECONDS }}
          OTP_MAX_ATTEMPTS: ${{ secrets.OTP_MAX_ATTEMPTS }}
          OTP_VERIFY_BLOCK_SECONDS: ${{ secrets.OTP_VERIFY_BLOCK_SECONDS }}
          VERIFIED_TTL_SECONDS: ${{ secrets.VERIFIED_TTL_SECONDS }}
          NOTIFICATION_WORKER_ENABLED: "true"
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: ${{ secrets.EC2_PORT }}
          envs: APP_IMAGE,APP_PORT,DOCKER_USERNAME,DOCKER_PASSWORD,MONGODB_URL,REDIS_URL,MONGO_USER,MONGO_PASSWORD,ACCESS_TOKEN_SECRET,REFRESH_TOKEN_SECRET,EMAIL_USER,EMAIL_PASS,GOOGLE_OAUTH_CLIENT_ID,GOOGLE_OAUTH_CLIENT_SECRET,GOOGLE_OAUTH_REDIRECT_URI,VNPAY_PAYMENT_URL,VNPAY_TERMINAL_CODE,VNPAY_HASH_SECRET,VNPAY_RETURN_URL,VNPAY_IPN_URL,GLOBAL_API_RATE_LIMIT_MAX_REQUESTS,GLOBAL_API_RATE_LIMIT_WINDOW_SECONDS,LOGIN_FAIL_MAX_ATTEMPTS,LOGIN_FAIL_WINDOW_SECONDS,LOGIN_FAIL_BLOCK_SECONDS,OTP_TTL_SECONDS,OTP_MAX_ATTEMPTS,OTP_VERIFY_BLOCK_SECONDS,VERIFIED_TTL_SECONDS,NOTIFICATION_WORKER_ENABLED
          script_stop: true
          script: |
            set -euo pipefail

            DEPLOY_DIRECTORY="/home/${{ secrets.EC2_USER }}/ecommerce-backend"

            echo "Deploying into ${DEPLOY_DIRECTORY}"
            cd "${DEPLOY_DIRECTORY}"

            echo "Updating source code..."
            git fetch origin main
            git checkout main
            git reset --hard origin/main
            git clean -fd

            echo "Logging in to Docker Hub..."
            echo "${DOCKER_PASSWORD}" | docker login -u "${DOCKER_USERNAME}" --password-stdin

            echo "Writing production environment file..."
            cat > .env <<EOF
            NODE_ENV=production
            PORT=${APP_PORT}
            APP_IMAGE=${APP_IMAGE}
            MONGODB_URL=${MONGODB_URL}
            REDIS_URL=${REDIS_URL}
            MONGO_USER=${MONGO_USER}
            MONGO_PASSWORD=${MONGO_PASSWORD}
            ACCESS_TOKEN_SECRET=${ACCESS_TOKEN_SECRET}
            REFRESH_TOKEN_SECRET=${REFRESH_TOKEN_SECRET}
            EMAIL_USER=${EMAIL_USER}
            EMAIL_PASS=${EMAIL_PASS}
            GOOGLE_OAUTH_CLIENT_ID=${GOOGLE_OAUTH_CLIENT_ID}
            GOOGLE_OAUTH_CLIENT_SECRET=${GOOGLE_OAUTH_CLIENT_SECRET}
            GOOGLE_OAUTH_REDIRECT_URI=${GOOGLE_OAUTH_REDIRECT_URI}
            VNPAY_PAYMENT_URL=${VNPAY_PAYMENT_URL}
            VNPAY_TERMINAL_CODE=${VNPAY_TERMINAL_CODE}
            VNPAY_HASH_SECRET=${VNPAY_HASH_SECRET}
            VNPAY_RETURN_URL=${VNPAY_RETURN_URL}
            VNPAY_IPN_URL=${VNPAY_IPN_URL}
            GLOBAL_API_RATE_LIMIT_MAX_REQUESTS=${GLOBAL_API_RATE_LIMIT_MAX_REQUESTS}
            GLOBAL_API_RATE_LIMIT_WINDOW_SECONDS=${GLOBAL_API_RATE_LIMIT_WINDOW_SECONDS}
            LOGIN_FAIL_MAX_ATTEMPTS=${LOGIN_FAIL_MAX_ATTEMPTS}
            LOGIN_FAIL_WINDOW_SECONDS=${LOGIN_FAIL_WINDOW_SECONDS}
            LOGIN_FAIL_BLOCK_SECONDS=${LOGIN_FAIL_BLOCK_SECONDS}
            OTP_TTL_SECONDS=${OTP_TTL_SECONDS}
            OTP_MAX_ATTEMPTS=${OTP_MAX_ATTEMPTS}
            OTP_VERIFY_BLOCK_SECONDS=${OTP_VERIFY_BLOCK_SECONDS}
            VERIFIED_TTL_SECONDS=${VERIFIED_TTL_SECONDS}
            NOTIFICATION_WORKER_ENABLED=${NOTIFICATION_WORKER_ENABLED}
            EOF

            chmod +x .scripts/deploy-ec2.sh
            ./.scripts/deploy-ec2.sh
