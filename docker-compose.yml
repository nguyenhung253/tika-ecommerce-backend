services:
  app:
    image: ${APP_IMAGE:-ecommerce-backend:latest}
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ecommerce_api
    ports:
      - "4953:4953"
    env_file:
      - .env
    environment:
      PORT: 4953
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      MONGODB_URL: ${MONGODB_URL:-mongodb://${MONGO_USER}:${MONGO_PASSWORD}@mongodb:27017/ecommerce?authSource=admin}
    depends_on:
      - mongodb
      - redis
    networks:
      - ecommerce_network
    restart: unless-stopped

  mongodb:
    image: mongo:6.0
    container_name: ecommerce_mongodb
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD}
    volumes:
      - mongodb_data:/data/db
    networks:
      - ecommerce_network
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: ecommerce_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - ecommerce_network
    restart: unless-stopped
    command: redis-server --appendonly yes

volumes:
  mongodb_data:
  redis_data:

networks:
  ecommerce_network:
    driver: bridge
